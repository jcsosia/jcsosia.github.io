name: General feedback
description: Share praise, questions, or open-ended feedback about HatSwap.
title: "[Feedback]: "
labels:
  - feedback
  - needs triage
body:
  - type: markdown
    attributes:
      value: |
        Use this form for thoughts that are not clearly a bug or a feature request.
  - type: textarea
    id: feedback
    attributes:
      label: Feedback
      description: What would you like to share?
      placeholder: Share your thoughts, questions, praise, or suggestions.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Tell us when or where this came up, if relevant.
  - type: checkboxes
    id: followup
    attributes:
      label: Follow-up permission
      options:
        - label: I am comfortable with the maintainers following up for clarification if needed.