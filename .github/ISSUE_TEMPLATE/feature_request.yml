name: Feature request
description: Suggest an improvement or new capability for HatSwap.
title: "[Feature]: "
labels:
  - enhancement
  - needs triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea. Please explain the problem first, then describe the change you want to see.
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
      placeholder: Describe the current limitation or pain point.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like HatSwap to do?
      placeholder: Describe the feature, workflow, or behavior you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you think about?
      placeholder: Mention any workarounds or competing ideas.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add mockups, examples, or references that help explain the request.