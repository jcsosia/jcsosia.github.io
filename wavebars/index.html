<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Friendly Audio Bar Player & Video Exporter</title>
    <!-- Explicitly bundled v7 UMD distribution -->
    <script src="https://unpkg.com/wavesurfer.js@7/dist/wavesurfer.min.js"></script>
    <style>
        body {
            background-color: #121212;
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
        }

        .player-container {
            width: 100%;
            max-width: 500px;
            background: #1e1e1e;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        .controls-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            margin-top: 20px;
        }

        input[type="file"] {
            display: none;
        }

        .upload-label {
            background: #333333;
            color: #ffffff;
            border: 2px dashed #555555;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            display: inline-block;
            transition: background 0.2s;
        }

        .upload-label:hover {
            background: #444444;
        }

        #waveform {
            width: 100%;
            height: 90px;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .btn {
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            display: none;
            width: 100%;
            max-width: 240px;
            box-sizing: border-box;
        }

        .play-btn {
            background: #ff5500;
            /* SoundCloud orange */
        }

        .export-btn {
            background: #0076ff;
            /* Clean Blue */
        }

        .export-btn:disabled {
            background: #555555;
            cursor: not-allowed;
        }

        #fileName {
            font-size: 14px;
            color: #aaaaaa;
            margin-bottom: 15px;
            word-break: break-all;
        }
    </style>
</head>

<body>

    <div class="player-container">
        <div id="fileName">Select an audio file to begin</div>
        <div id="waveform"></div>

        <div class="controls-group">
            <label for="fileInput" class="upload-label">Choose Audio File</label>
            <input type="file" id="fileInput" accept="audio/*">

            <button id="playBtn" class="btn play-btn">Play / Pause</button>
            <button id="exportBtn" class="btn export-btn">Export to Video</button>
        </div>
    </div>

    <script type="module">
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof WaveSurfer === 'undefined') return;

            // Initialize the player
            const wavesurfer = WaveSurfer.create({
                container: '#waveform',
                waveColor: '#444444',
                progressColor: '#ff5500',
                height: 90,
                barWidth: 3,
                barGap: 3,
                barRadius: 3,
                cursorWidth: 0,
            });

            const fileInput = document.getElementById('fileInput');
            const playBtn = document.getElementById('playBtn');
            const exportBtn = document.getElementById('exportBtn');
            const fileNameDisplay = document.getElementById('fileName');
            let currentFileUrl = null;
            const revokeCurrentFileUrl = () => {
                if (currentFileUrl) {
                    URL.revokeObjectURL(currentFileUrl);
                    currentFileUrl = null;
                }
            };

            // FIX 1: Correct handling of the file array index to halt rogue downloads
            fileInput.addEventListener('change', function (e) {
                const files = e.target.files;
                if (files && files.length > 0) {
                    const file = files[0];
                    fileNameDisplay.textContent = file.name;

                    revokeCurrentFileUrl();
                    currentFileUrl = URL.createObjectURL(file);
                    wavesurfer.load(currentFileUrl);

                    playBtn.style.display = 'block';
                    exportBtn.style.display = 'block';
                    exportBtn.disabled = false;
                    exportBtn.textContent = "Export to Video";
                }
            });

            playBtn.addEventListener('click', () => {
                wavesurfer.playPause();
            });

            // VIDEO EXPORT LOGIC
            exportBtn.addEventListener('click', async () => {
                if (!currentFileUrl) {
                    alert("Please load an audio file before exporting.");
                    return;
                }
                const duration = wavesurfer.getDuration();
                if (!Number.isFinite(duration) || duration <= 0) {
                    alert("Audio is still loading. Please wait, then try exporting again.");
                    return;
                }
                if (typeof MediaRecorder === 'undefined') {
                    alert("Video export is not supported in this browser.");
                    return;
                }

                exportBtn.disabled = true;
                exportBtn.textContent = "Recording...";
                const resetExportButton = () => {
                    exportBtn.disabled = false;
                    exportBtn.textContent = "Export to Video";
                };

                // Check captureStream support before doing any work
                if (typeof document.createElement('canvas').captureStream !== 'function') {
                    alert("Video export is not supported on this browser.\n\nFor video export, please use Chrome or Firefox on a desktop or Android device.");
                    resetExportButton();
                    return;
                }

                wavesurfer.pause();
                wavesurfer.setTime(0);
                await new Promise(requestAnimationFrame);

                // In WaveSurfer v7 the renderer wrapper lives inside an injected
                // shadow tree, so getWrapper() points at the waveform wrapper,
                // not at the shadow host itself.
                const wrapper = wavesurfer.getWrapper();
                const waveformEl = document.getElementById('waveform');
                const rendererRoot = wrapper?.getRootNode?.();
                const sourceCanvases = [
                    ...Array.from(wrapper?.querySelectorAll('canvas') ?? []),
                    ...Array.from(
                        rendererRoot instanceof ShadowRoot
                            ? rendererRoot.querySelectorAll('canvas')
                            : []
                    ),
                    ...Array.from(waveformEl?.querySelectorAll('canvas') ?? []),
                    ...Array.from(waveformEl?.children ?? []).flatMap(child =>
                        child.shadowRoot ? Array.from(child.shadowRoot.querySelectorAll('canvas')) : []
                    ),
                ].filter((canvas, index, allCanvases) => allCanvases.indexOf(canvas) === index);

                const progressLayer = wrapper?.querySelector('.progress')
                    ?? (rendererRoot instanceof ShadowRoot ? rendererRoot.querySelector('.progress') : null);
                const wrapperRect = wrapper?.getBoundingClientRect();

                if (!wrapperRect || wrapperRect.width <= 0 || wrapperRect.height <= 0 || sourceCanvases.length === 0) {
                    alert("Could not locate the waveform canvas. Please try again.");
                    resetExportButton();
                    return;
                }

                // Create a dedicated composite canvas and mirror WaveSurfer's
                // progress clipping so the export matches the on-screen playback.
                const recordCanvas = document.createElement('canvas');
                const FALLBACK_WIDTH = 500;  // matches .player-container max-width
                const FALLBACK_HEIGHT = 90;  // matches WaveSurfer height option
                const displayWidth = wrapperRect.width || waveformEl.offsetWidth || FALLBACK_WIDTH;
                const displayHeight = wrapperRect.height || waveformEl.offsetHeight || FALLBACK_HEIGHT;
                const sourcePixelWidth = sourceCanvases.reduce(
                    (maxWidth, canvas) => Math.max(maxWidth, canvas.width),
                    displayWidth
                );
                const exportScale = Math.max(window.devicePixelRatio || 1, 2);
                const exportWidth = Math.min(
                    Math.max(Math.round(displayWidth * exportScale), sourcePixelWidth, 960),
                    1920
                );
                const exportHeight = Math.max(
                    Math.round(exportWidth * (displayHeight / displayWidth)),
                    1
                );
                recordCanvas.width = exportWidth;
                recordCanvas.height = exportHeight;
                const ctx = recordCanvas.getContext('2d');
                if (!ctx) {
                    alert("Could not create the export canvas. Please try again.");
                    resetExportButton();
                    return;
                }
                ctx.imageSmoothingEnabled = false;

                const scaleX = recordCanvas.width / displayWidth;
                const scaleY = recordCanvas.height / displayHeight;
                const layeredCanvases = sourceCanvases.map(canvas => ({
                    canvas,
                    rect: canvas.getBoundingClientRect(),
                    isProgressLayer: Boolean(canvas.closest('.progress')),
                }));
                const baseLayers = layeredCanvases.filter(layer => !layer.isProgressLayer);
                const progressLayers = layeredCanvases.filter(layer => layer.isProgressLayer);

                const drawLayer = ({ canvas, rect }) => {
                    if (canvas.width <= 0 || canvas.height <= 0 || rect.width <= 0 || rect.height <= 0) {
                        return;
                    }

                    const destX = (rect.left - wrapperRect.left) * scaleX;
                    const destY = (rect.top - wrapperRect.top) * scaleY;
                    const destWidth = rect.width * scaleX;
                    const destHeight = rect.height * scaleY;
                    ctx.drawImage(canvas, destX, destY, destWidth, destHeight);
                };

                let animFrameId = null;
                const drawFrame = () => {
                    ctx.fillStyle = '#1e1e1e';
                    ctx.fillRect(0, 0, recordCanvas.width, recordCanvas.height);
                    baseLayers.forEach(drawLayer);

                    if (progressLayers.length > 0 && progressLayer) {
                        const progressRect = progressLayer.getBoundingClientRect();
                        const clipLeft = Math.max(0, (progressRect.left - wrapperRect.left) * scaleX);
                        const clipRight = Math.min(
                            recordCanvas.width,
                            (progressRect.right - wrapperRect.left) * scaleX
                        );
                        const clipWidth = Math.max(0, clipRight - clipLeft);

                        if (clipWidth > 0) {
                            ctx.save();
                            ctx.beginPath();
                            ctx.rect(clipLeft, 0, clipWidth, recordCanvas.height);
                            ctx.clip();
                            progressLayers.forEach(drawLayer);
                            ctx.restore();
                        }
                    }

                    animFrameId = requestAnimationFrame(drawFrame);
                };
                drawFrame();

                // Capture visual stream from the composite canvas at 30 fps
                const videoStream = recordCanvas.captureStream(30);

                // FIX 2: Safely target the core underlying Media Element stream for sound routing
                const audioElement = wavesurfer.getMediaElement();
                let combinedStream;

                if (audioElement && typeof audioElement.captureStream === 'function') {
                    const audioStream = audioElement.captureStream();
                    combinedStream = new MediaStream([
                        ...videoStream.getVideoTracks(),
                        ...audioStream.getAudioTracks()
                    ]);
                } else {
                    // Fallback: If mobile browser blocks audio capture stream routing, record video-only
                    combinedStream = videoStream;
                    console.warn("Audio stream trace dropped. Outputting visual layer only.");
                }

                const stopStreamTracks = () => {
                    cancelAnimationFrame(animFrameId);
                    combinedStream.getTracks().forEach(track => track.stop());
                };

                // Standardize output formats across mobile safari and android chrome
                const mimeCandidates = ['video/webm;codecs=vp9', 'video/webm;codecs=vp8', 'video/webm', 'video/mp4'];
                const mimeType = mimeCandidates.find(type => MediaRecorder.isTypeSupported(type));
                const hasAudioTrack = combinedStream.getAudioTracks().length > 0;
                const recorderOptions = {
                    ...(mimeType ? { mimeType } : {}),
                    videoBitsPerSecond: exportWidth >= 1440 ? 8000000 : 6000000,
                    ...(hasAudioTrack ? { audioBitsPerSecond: 192000 } : {}),
                };
                let mediaRecorder;
                try {
                    mediaRecorder = new MediaRecorder(combinedStream, recorderOptions);
                } catch (error) {
                    console.warn("Falling back to default recorder options:", error);
                    try {
                        mediaRecorder = mimeType
                            ? new MediaRecorder(combinedStream, { mimeType })
                            : new MediaRecorder(combinedStream);
                    } catch (fallbackError) {
                        console.error("Failed to initialize video recording:", fallbackError);
                        alert("Video export is not available on this browser.");
                        stopStreamTracks();
                        resetExportButton();
                        return;
                    }
                }
                const recordedChunks = [];
                let recorderErrored = false;
                let isCleanedUp = false;
                let unsubscribeFromFinish = () => { };

                mediaRecorder.ondataavailable = (event) => {
                    if (event.data.size > 0) {
                        recordedChunks.push(event.data);
                    }
                };

                const cleanupAfterRecording = () => {
                    if (isCleanedUp) return;
                    isCleanedUp = true;
                    stopStreamTracks();
                    resetExportButton();
                    unsubscribeFromFinish();
                };

                unsubscribeFromFinish = wavesurfer.on('finish', () => {
                    if (mediaRecorder.state !== 'inactive') {
                        mediaRecorder.stop();
                    }
                });

                mediaRecorder.onstop = () => {
                    if (recorderErrored) {
                        cleanupAfterRecording();
                        return;
                    }
                    const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType });
                    const url = URL.createObjectURL(blob);

                    const a = document.createElement('a');
                    a.href = url;
                    // Save with matching native format tag
                    const extension = mediaRecorder.mimeType.includes('mp4') ? 'mp4' : 'webm';
                    a.download = `waveform_export.${extension}`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);

                    cleanupAfterRecording();
                };

                mediaRecorder.onerror = (event) => {
                    console.error("MediaRecorder error:", event);
                    recorderErrored = true;
                    alert("Video recording failed. Please try again.");
                    if (mediaRecorder.state !== 'inactive') {
                        mediaRecorder.stop();
                    }
                    cleanupAfterRecording();
                };

                mediaRecorder.start();
                wavesurfer.play();
            });
        });
    </script>

</body>

</html>
